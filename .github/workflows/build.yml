name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install mingw-w64
      run: |
        choco install mingw -y
        echo "C:\ProgramData\mingw64\mingw64\bin" >> $env:GITHUB_PATH
    
    - name: Build Windows AMD64
      run: |
        $env:CC = "gcc"
        go build -ldflags="-s -w" -o "lost-windows-amd64.exe" ./cmd
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: lost-windows-amd64
        path: lost-windows-amd64.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build macOS AMD64
      env:
        GOARCH: amd64
      run: |
        go build -ldflags="-s -w" -o "lost-darwin-amd64" ./cmd
    
    - name: Build macOS ARM64
      env:
        GOARCH: arm64
      run: |
        go build -ldflags="-s -w" -o "lost-darwin-arm64" ./cmd
    
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lost-darwin
        path: |
          lost-darwin-amd64
          lost-darwin-arm64

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
    
    - name: Build Linux AMD64
      run: |
        go build -ldflags="-s -w" -o "lost-linux-amd64" ./cmd
    
    - name: Build Linux ARM64
      env:
        CC: aarch64-linux-gnu-gcc
        GOARCH: arm64
      run: |
        go build -ldflags="-s -w" -o "lost-linux-arm64" ./cmd
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lost-linux
        path: |
          lost-linux-amd64
          lost-linux-arm64

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
    
    - name: List artifacts
      run: ls -la artifacts/
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        generate_release_notes: true
        body: |
          ## Lost - Never lose a terminal command again
          
          ### Downloads
          
          **Windows:** `lost-windows-amd64.exe`
          
          **macOS:** 
          - Intel: `lost-darwin-amd64`
          - Apple Silicon: `lost-darwin-arm64`
          
          **Linux:**
          - x64: `lost-linux-amd64`
          - ARM64: `lost-linux-arm64`
          
          ### Quick Start
          
          ```bash
          # Install shell integration
          ./lost install
          
          # Add a command with tag
          lost add "docker compose up -d" --tag docker
          
          # Run by tag
          lost run docker
          
          # Search and run
          lost search -t docker -r
          ```
          
          Created by @korybantes
